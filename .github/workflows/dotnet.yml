name: .NET build and test

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      actions: read
      checks: write

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Test and collect coverage
        run: dotnet test --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx" --results-directory ./TestResults --collect:"XPlat Code Coverage"

      - name: Publish test results to UI
        uses: dorny/test-reporter@v3
        if: ${{ !cancelled() }}
        with:
          name: .NET Test Results
          path: ./TestResults/*.trx
          reporter: dotnet-trx

      - name: Generate coverage report
        uses: danielpalme/ReportGenerator-GitHub-Action@5.5.4
        with:
          reports: '**/coverage.cobertura.xml'
          targetdir: 'coveragereport'
          reporttypes: 'MarkdownSummaryGithub'

      - name: Output coverage to job summary
        run: cat coveragereport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY
